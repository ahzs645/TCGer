version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    profiles:
      - legacy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tcg_collection}
      POSTGRES_USER: ${POSTGRES_USER:-tcguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tcgpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tcg-net

  convex-backend:
    build:
      context: ..
      dockerfile: docker/convex-backend.Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CONVEX_AGENT_MODE: ${CONVEX_AGENT_MODE:-anonymous}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?err}
      BETTER_AUTH_DISABLE_ORIGIN_CHECK: ${BETTER_AUTH_DISABLE_ORIGIN_CHECK:-false}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000/api/auth}
      SCRYFALL_API_BASE_URL: ${SCRYFALL_API_BASE_URL:-http://scryfall-bulk:4010}
      YGO_API_BASE_URL: ${YGO_API_BASE_URL:-http://ygo-cache:4020}
      POKEMON_API_BASE_URL: ${POKEMON_API_BASE_URL:-http://tcgdex-cache:4040}
      TCGDEX_API_BASE_URL: ${TCGDEX_API_BASE_URL:-http://tcgdex-cache:4040}
    ports:
      - "${CONVEX_PORT:-3210}:3210"
      - "${CONVEX_SITE_PORT:-3211}:3211"
    networks:
      - tcg-net

  scryfall-bulk:
    build:
      context: ..
      dockerfile: services/scryfall-bulk/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SCRYFALL_BULK_TYPE: ${SCRYFALL_BULK_TYPE:-oracle_cards}
      SCRYFALL_BULK_REFRESH_MS: ${SCRYFALL_BULK_REFRESH_MS:-43200000}
      SCRYFALL_BULK_MAX_RESULTS: ${SCRYFALL_BULK_MAX_RESULTS:-50}
      PORT: 4010
    volumes:
      - scryfall_bulk_data:/data
    profiles:
      - bulk
    networks:
      - tcg-net

  ygo-cache:
    build:
      context: ..
      dockerfile: services/ygo-cache/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      YGO_SOURCE_BASE_URL: ${YGO_SOURCE_BASE_URL:-https://db.ygoprodeck.com/api/v7}
      YGO_CACHE_REFRESH_MS: ${YGO_CACHE_REFRESH_MS:-43200000}
      YGO_CACHE_PAGE_SIZE: ${YGO_CACHE_PAGE_SIZE:-20}
      YGO_CACHE_MAX_PAGE_SIZE: ${YGO_CACHE_MAX_PAGE_SIZE:-200}
      PORT: 4020
    volumes:
      - ygo_cache_data:/data
    profiles:
      - bulk
    networks:
      - tcg-net

  pokemon-cache:
    build:
      context: ..
      dockerfile: services/pokemon-cache/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POKEMON_SOURCE_BASE_URL: ${POKEMON_SOURCE_BASE_URL:-https://api.pokemontcg.io/v2}
      POKEMON_SOURCE_API_KEY: ${POKEMON_SOURCE_API_KEY:-}
      POKEMON_TCG_API_KEY: ${POKEMON_TCG_API_KEY:-}
      POKEMON_CACHE_REFRESH_MS: ${POKEMON_CACHE_REFRESH_MS:-43200000}
      POKEMON_CACHE_PAGE_SIZE: ${POKEMON_CACHE_PAGE_SIZE:-20}
      POKEMON_CACHE_MAX_PAGE_SIZE: ${POKEMON_CACHE_MAX_PAGE_SIZE:-200}
      POKEMON_CACHE_FETCH_PAGE_SIZE: ${POKEMON_CACHE_FETCH_PAGE_SIZE:-250}
      POKEMON_CACHE_FETCH_DELAY_MS: ${POKEMON_CACHE_FETCH_DELAY_MS:-200}
      PORT: 4030
    volumes:
      - pokemon_cache_data:/data
    profiles:
      - bulk
    networks:
      - tcg-net

  tcgdex-cache:
    build:
      context: ..
      dockerfile: services/tcgdex-cache/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TCGDEX_CACHE_REFRESH_MS: ${TCGDEX_CACHE_REFRESH_MS:-86400000}
      TCGDEX_CACHE_PAGE_SIZE: ${TCGDEX_CACHE_PAGE_SIZE:-20}
      PORT: 4040
    volumes:
      - tcgdex_cache_data:/data
    profiles:
      - bulk
    networks:
      - tcg-net

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_MODE: ${BACKEND_MODE:-convex}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tcguser}:${POSTGRES_PASSWORD:-tcgpassword}@postgres:5432/${POSTGRES_DB:-tcg_collection}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      COLLECTIONS_BACKEND: ${COLLECTIONS_BACKEND:-convex}
      WISHLISTS_BACKEND: ${WISHLISTS_BACKEND:-convex}
      CONVEX_HTTP_ORIGIN: ${CONVEX_HTTP_ORIGIN:-http://convex-backend:3211}
      POKEMON_TCG_API_KEY: ${POKEMON_TCG_API_KEY:-}
      SCRYFALL_API_BASE_URL: ${SCRYFALL_API_BASE_URL:-http://scryfall-bulk:4010}
      YGO_API_BASE_URL: ${YGO_API_BASE_URL:-http://ygo-cache:4020}
      POKEMON_API_BASE_URL: ${POKEMON_API_BASE_URL:-http://tcgdex-cache:4040}
      TCGDEX_API_BASE_URL: ${TCGDEX_API_BASE_URL:-http://tcgdex-cache:4040}
    depends_on:
      convex-backend:
        condition: service_started
    networks:
      - tcg-net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      target: production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api}
      BACKEND_API_ORIGIN: ${BACKEND_API_ORIGIN:-http://backend:3000}
      NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL:-http://localhost:3210}
      NEXT_PUBLIC_CONVEX_SITE_URL: ${NEXT_PUBLIC_CONVEX_SITE_URL:-http://localhost:3211}
      CONVEX_URL_INTERNAL: ${CONVEX_URL_INTERNAL:-http://convex-backend:3210}
      CONVEX_SITE_URL_INTERNAL: ${CONVEX_SITE_URL_INTERNAL:-http://convex-backend:3211}
    depends_on:
      backend:
        condition: service_started
    networks:
      - tcg-net

  gateway:
    image: nginx:1.25-alpine
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${APP_PORT:-3000}:80"
    networks:
      - tcg-net

volumes:
  postgres_data:
  scryfall_bulk_data:
  ygo_cache_data:
  pokemon_cache_data:
  tcgdex_cache_data:

networks:
  tcg-net:
    driver: bridge
