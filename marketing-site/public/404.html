<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect hack.
    // When GitHub Pages can't find a file, it serves this 404.html.
    // We encode the current path into a query parameter and redirect to
    // the root, where a script in index.html will restore the path via
    // history.replaceState so the SPA router can handle it.
    var pathSegmentsToKeep = 0; // 0 for username.github.io, 1 for project pages
    var repo = location.pathname.split('/')[1];

    // Detect if we're on a custom domain (no repo prefix)
    var isCustomDomain = location.hostname !== 'ahzs645.github.io';

    if (isCustomDomain) {
      // Custom domain: redirect to root with the full path
      sessionStorage.setItem('spa-redirect', location.pathname + location.search);
      location.replace('/');
    } else {
      // Project page: keep the repo prefix
      var l = location;
      sessionStorage.setItem('spa-redirect', l.pathname.slice(1) + l.search);
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
      );
    }
  </script>
</head>
<body>
  Redirecting&hellip;
</body>
</html>
